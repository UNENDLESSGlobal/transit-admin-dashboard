<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Metro Admin Dashboard</title>
    <meta name="description"
        content="Admin dashboard for managing public transit metro routes and operational status." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
        rel="stylesheet" />

    <!-- Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <link rel="stylesheet" href="index.css" />
</head>

<body>

    <!-- ═══════════════ SIDEBAR ═══════════════ -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo">
                <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10" />
                    <path d="M8 12h8M12 8v8" />
                </svg>
                <span class="logo-text">Metro Admin</span>
            </div>
        </div>

        <nav class="sidebar-nav">
            <a href="#" class="nav-item active" id="navRoutes">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z" />
                    <line x1="4" y1="22" x2="4" y2="15" />
                </svg>
                <span>Metro Routes</span>
                <span class="nav-badge" id="routesBadge">0</span>
            </a>
        </nav>

        <div class="sidebar-footer">
            <div class="theme-switcher">
                <select id="themeSelect" class="theme-select" aria-label="Select theme">
                    <option value="system">System Default</option>
                    <option value="dark">Dark Theme</option>
                    <option value="light">Light Theme</option>
                </select>
                <svg class="dropdown-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="6 9 12 15 18 9"></polyline>
                </svg>
            </div>

            <button class="btn-logout" id="logoutBtn" title="Log out">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                    <polyline points="16 17 21 12 16 7" />
                    <line x1="21" y1="12" x2="9" y2="12" />
                </svg>
                <span class="logout-label">Log out</span>
            </button>
            <div class="connection-status" id="connectionBadge">
                <span class="status-dot"></span>
                <span id="connectionText">Connecting…</span>
            </div>
        </div>
    </aside>

    <!-- ═══════════════ MAIN CONTENT ═══════════════ -->
    <main class="main-content">
        <!-- Top Bar -->
        <header class="top-bar">
            <div class="top-bar-left">
                <button class="hamburger" id="hamburgerBtn" aria-label="Toggle sidebar">
                    <span></span><span></span><span></span>
                </button>
                <h1 class="page-title">Metro Routes</h1>
            </div>
            <div class="top-bar-right">
                <button class="btn btn-refresh" id="refreshBtn" onclick="refreshData()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="23 4 23 10 17 10" />
                        <polyline points="1 20 1 14 7 14" />
                        <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15" />
                    </svg>
                    Refresh Data
                </button>
            </div>
        </header>

        <!-- Status Cards -->
        <section class="stat-cards">
            <div class="stat-card">
                <div class="stat-icon total"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2">
                        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
                        <circle cx="9" cy="7" r="4" />
                        <path d="M23 21v-2a4 4 0 0 0-3-3.87" />
                        <path d="M16 3.13a4 4 0 0 1 0 7.75" />
                    </svg></div>
                <div class="stat-body"><span class="stat-value" id="totalRoutes">0</span><span class="stat-label">Total
                        Routes</span></div>
            </div>
            <div class="stat-card">
                <div class="stat-icon active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2">
                        <polyline points="22 12 18 12 15 21 9 3 6 12 2 12" />
                    </svg></div>
                <div class="stat-body"><span class="stat-value" id="activeRoutes">0</span><span
                        class="stat-label">Active</span></div>
            </div>
            <div class="stat-card">
                <div class="stat-icon disabled"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2">
                        <circle cx="12" cy="12" r="10" />
                        <line x1="4.93" y1="4.93" x2="19.07" y2="19.07" />
                    </svg></div>
                <div class="stat-body"><span class="stat-value" id="disabledRoutes">0</span><span
                        class="stat-label">Disabled</span></div>
            </div>
        </section>

        <!-- Search -->
        <section class="search-bar-wrapper">
            <div class="search-box">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8" />
                    <line x1="21" y1="21" x2="16.65" y2="16.65" />
                </svg>
                <input type="text" id="searchInput" placeholder="Search stations or lines…" oninput="applyFilters()" />
            </div>
            <div class="line-filters" id="lineFilters"></div>
        </section>

        <!-- Data Table -->
        <section class="table-wrapper">
            <table class="data-table" id="routeTable">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Station 1</th>
                        <th>Station 2</th>
                        <th>Line</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="routeTableBody"></tbody>
            </table>

            <div class="empty-state" id="emptyState">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path
                        d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z" />
                    <polyline points="3.27 6.96 12 12.01 20.73 6.96" />
                    <line x1="12" y1="22.08" x2="12" y2="12" />
                </svg>
                <p>No routes found</p>
                <span>Try adjusting your search or filters.</span>
            </div>
        </section>
    </main>

    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
        <span>Fetching route data…</span>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <script src="app.js"></script>
</body>

</html>
